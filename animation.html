<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Animation Card</title>

        <style>
            body {
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;

                perspective: 1000px;
            }
            .card {
                width: 300px;
                height: 400px;
                border-radius: 12px;
                background: hsla(331, 100%, 59%, 1);

                background: linear-gradient(
                    90deg,
                    hsla(331, 100%, 59%, 1) 0%,
                    hsla(226, 69%, 30%, 1) 100%
                );
                font-family: monospace;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 32px;
                font-weight: bold;
                color: white;
                transition: 0.3s ease;
                transform-style: preserve-3d;
            }

            .card:hover {
                transform: rotateX(30deg);
            }
        </style>
    </head>
    <body>
        <div class="card">Card</div>
    </body>
</html>
